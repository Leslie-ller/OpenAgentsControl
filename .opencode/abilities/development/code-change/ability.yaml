name: development/code-change
description: Enforced high-level coding workflow with explicit analyze, execute, validate, review, and completion stages.
task_type: code_change

triggers:
  keywords:
    - "/code-change"
    - "code change workflow"

inputs:
  task_id:
    type: string
    required: false
    default: task_001
    description: Stable task identifier for generated coding artifacts
  objective:
    type: string
    required: true
    description: Objective for this code change task
  acceptance_criteria:
    type: string
    required: true
    description: Semicolon-separated acceptance criteria list
  path:
    type: string
    required: false
    default: small
    description: Workflow path, small or complex
  execution_mode:
    type: string
    required: false
    default: serial
    description: Complex-path execution mode, serial or parallel_safe
  affected_files:
    type: string
    required: false
    default: src/example.ts
    description: Comma-separated affected files list
  dependency_violations:
    type: string
    required: false
    default: ""
    description: Semicolon-separated subtask dependency violations for complex path evidence
  validation_command:
    type: string
    required: false
    default: echo validation_ok
  review_verdict:
    type: string
    required: false
    default: pass
    description: Review verdict, pass or fail
  review_blocking_findings:
    type: string
    required: false
    default: ""
    description: Semicolon-separated blocking review findings
  commit_message:
    type: string
    required: false
    default: ""
    description: Optional explicit git commit message for workflow-generated changes

obligations:
  - key: requirements_checked
    severity: hard
    tags: [requirements-checked]
    signals: [requirements_checked]
    requiredFields: [acceptance_criteria]
  - key: affected_files_identified
    severity: hard
    tags: [affected-files]
    signals: [affected_files_identified]
    requiredFields: [affected_files]
  - key: implementation_recorded
    severity: hard
    tags: [implementation-recorded]
    signals: [implementation_recorded]
    requiredFields: [changed_files]
  - key: run_tests
    severity: hard
    tags: [test]
  - key: record_validation
    severity: hard
    tags: [validation]
  - key: verification_evidence_recorded
    severity: hard
    tags: [verification-evidence]
    signals: [verification_evidence_recorded]
    requiredFields: [commands, exit_codes, results]
  - key: review_completed
    severity: hard
    tags: [review-completed]
    signals: [review_completed]
    requiredFields: [verdict, blocking_findings]
  - key: commit_if_required
    severity: soft
    tags: [commit]

steps:
  - id: analyze
    type: script
    run: |
      python3 - <<'PY'
      import json
      criteria = [c.strip() for c in "{{inputs.acceptance_criteria}}".split(';') if c.strip()]
      files = [f.strip() for f in "{{inputs.affected_files}}".split(',') if f.strip()]
      print(json.dumps({
        "objective": "{{inputs.objective}}",
        "acceptance_criteria": criteria,
        "affected_files": files,
        "complexity": "{{inputs.path}}",
      }))
      PY
    tags: [requirements-checked, affected-files]

  - id: plan
    type: script
    run: |
      python3 - <<'PY'
      import json
      criteria = [c.strip() for c in "{{inputs.acceptance_criteria}}".split(';') if c.strip()]
      files = [f.strip() for f in "{{inputs.affected_files}}".split(',') if f.strip()]
      print(json.dumps({
        "task_id": "{{inputs.task_id}}",
        "objective": "{{inputs.objective}}",
        "path": "{{inputs.path}}",
        "context_files": files,
        "reference_files": files,
        "acceptance_criteria": criteria,
        "deliverables": ["implementation", "validation", "review", "completion"],
        "complexity": "{{inputs.path}}",
        "subtask_count": len(files) if "{{inputs.path}}" == "complex" else 0,
      }))
      PY
    needs: [analyze]

  - id: plan-complex-subtasks
    type: script
    run: |
      python3 - <<'PY'
      import json
      files = [f.strip() for f in "{{inputs.affected_files}}".split(',') if f.strip()]
      violations = [item.strip() for item in "{{inputs.dependency_violations}}".split(';') if item.strip()]
      criteria = [c.strip() for c in "{{inputs.acceptance_criteria}}".split(';') if c.strip()]
      parallel_safe = "{{inputs.execution_mode}}" == "parallel_safe"
      subtasks = []
      for i, file_path in enumerate(files):
        subtasks.append({
          "subtask_id": f"subtask_{i+1}",
          "task_id": "{{inputs.task_id}}",
          "title": f"Implement changes in {file_path}",
          "depends_on": [] if parallel_safe else ([f"subtask_{i}"] if i > 0 else []),
          "parallel": parallel_safe,
          "status": "pending",
          "deliverables": [f"update:{file_path}"],
          "acceptance_criteria": criteria,
          "agent": "coder-agent",
        })
      print(json.dumps({
        "task_id": "{{inputs.task_id}}",
        "complexity": "complex",
        "execution_mode": "{{inputs.execution_mode}}",
        "subtasks": subtasks,
        "dependency_graph": {
          "type": "parallel_safe" if parallel_safe else "linear",
          "count": len(subtasks)
        },
        "dependency_violations": violations,
      }))
      PY
    when: inputs.path == "complex"
    needs: [plan]

  - id: load-context
    type: script
    run: |
      python3 - <<'PY'
      import json
      files = [f.strip() for f in "{{inputs.affected_files}}".split(',') if f.strip()]
      print(json.dumps({
        "context_files": files,
        "reference_files": files,
      }))
      PY
    needs: [plan, plan-complex-subtasks]

  - id: execute-small
    type: agent
    agent: coder-agent
    prompt: |
      You are the workflow's implementation executor for a small code-change task.

      Objective:
      {{inputs.objective}}

      Acceptance criteria:
      {{inputs.acceptance_criteria}}

      Allowed target files:
      {{inputs.affected_files}}

      Requirements:
      - Make the real file edits needed to satisfy the objective.
      - Limit changes to the allowed target files unless a tiny adjacent change is unavoidable.
      - Update code, tests, and docs as needed to satisfy the acceptance criteria.
      - Do not just describe the work. Actually perform the edits in the workspace.
      - Return strict JSON only with this shape:
        {
          "changed_files": ["file1", "file2"],
          "implementation_summary": "what was implemented",
          "deliverables_completed": ["implementation"]
        }
    when: inputs.path == "small"
    tags: [implementation-recorded]
    needs: [load-context]

  - id: execute-complex
    type: agent
    agent: coder-agent
    prompt: |
      You are the workflow's implementation executor for a complex code-change task.

      Objective:
      {{inputs.objective}}

      Acceptance criteria:
      {{inputs.acceptance_criteria}}

      Allowed target files:
      {{inputs.affected_files}}

      Requirements:
      - Make the real file edits needed to satisfy the objective.
      - Respect the planned file boundaries unless a tiny adjacent change is required.
      - If the work can be broken into smaller internal chunks, do so mentally, but keep this as one implementation pass.
      - Update code, tests, and docs as needed to satisfy the acceptance criteria.
      - Return strict JSON only with this shape:
        {
          "changed_files": ["file1", "file2"],
          "subtask_count": 1,
          "implementation_summary": "what was implemented",
          "deliverables_completed": ["implementation"]
        }
    when: inputs.path == "complex"
    tags: [implementation-recorded]
    needs: [load-context]

  - id: validate
    type: script
    run: |
      python3 - <<'PY'
      import json, os, subprocess

      try:
          inputs = json.loads(os.environ.get("ABILITY_INPUTS_JSON", "{}"))
      except Exception:
          inputs = {}

      cmd = str(inputs.get("validation_command") or "{{inputs.validation_command}}")
      try:
          result = subprocess.run(cmd, shell=True, capture_output=True, text=True, timeout=300)
          actual_exit_code = result.returncode
          stdout = result.stdout.strip()
          stderr = result.stderr.strip()
      except subprocess.TimeoutExpired:
          actual_exit_code = 124
          stdout = ""
          stderr = "Command timed out after 300s"
      except Exception as err:
          actual_exit_code = 1
          stdout = ""
          stderr = str(err)

      verdict = "pass" if actual_exit_code == 0 else "fail"
      print(json.dumps({
        "commands": [cmd],
        "exit_codes": [actual_exit_code],
        "results": [verdict],
        "stdout_tail": stdout[-500:] if stdout else "",
        "stderr_tail": stderr[-500:] if stderr else "",
        "validated_claims": ["acceptance criteria covered"] if verdict == "pass" else [],
      }))
      if actual_exit_code != 0:
          raise SystemExit(actual_exit_code)
      PY
    on_failure: continue
    tags: [test, validation, verification-evidence]
    needs: [execute-small, execute-complex]

  - id: repair-after-validate
    type: agent
    agent: coder-agent
    prompt: |
      The previous validation step failed for this workflow task.

      Objective:
      {{inputs.objective}}

      Acceptance criteria:
      {{inputs.acceptance_criteria}}

      Allowed target files:
      {{inputs.affected_files}}

      Your job:
      - Inspect the validation output from the previous step.
      - Fix the implementation or tests so the task can pass validation.
      - Make real workspace edits, not just a plan.
      - Return strict JSON only with this shape:
        {
          "changed_files": ["file1", "file2"],
          "implementation_summary": "what you fixed after validation failed",
          "deliverables_completed": ["implementation", "repair"]
        }
    when: steps.validate.status == "failed"
    tags: [implementation-recorded]
    needs: [validate]

  - id: validate-after-repair
    type: script
    run: |
      python3 - <<'PY'
      import json, os, subprocess

      try:
          inputs = json.loads(os.environ.get("ABILITY_INPUTS_JSON", "{}"))
      except Exception:
          inputs = {}

      cmd = str(inputs.get("validation_command") or "{{inputs.validation_command}}")
      try:
          result = subprocess.run(cmd, shell=True, capture_output=True, text=True, timeout=300)
          actual_exit_code = result.returncode
          stdout = result.stdout.strip()
          stderr = result.stderr.strip()
      except subprocess.TimeoutExpired:
          actual_exit_code = 124
          stdout = ""
          stderr = "Command timed out after 300s"
      except Exception as err:
          actual_exit_code = 1
          stdout = ""
          stderr = str(err)

      verdict = "pass" if actual_exit_code == 0 else "fail"
      print(json.dumps({
        "commands": [cmd],
        "exit_codes": [actual_exit_code],
        "results": [verdict],
        "stdout_tail": stdout[-500:] if stdout else "",
        "stderr_tail": stderr[-500:] if stderr else "",
        "validated_claims": ["acceptance criteria covered after repair"] if verdict == "pass" else [],
      }))
      if actual_exit_code != 0:
          raise SystemExit(actual_exit_code)
      PY
    when: steps.repair-after-validate.status == "completed"
    on_failure: continue
    tags: [test, validation, verification-evidence]
    needs: [repair-after-validate]

  - id: validation-gate
    type: script
    run: |
      python3 - <<'PY'
      import json
      import os
      import sys

      try:
          steps = json.loads(os.environ.get("ABILITY_STEP_OUTPUTS_JSON", "{}"))
      except Exception:
          steps = {}

      validate_status = steps.get("validate", {}).get("status", "pending")
      repair_status = steps.get("repair-after-validate", {}).get("status", "pending")
      revalidate_status = steps.get("validate-after-repair", {}).get("status", "pending")

      passed = validate_status == "completed" or revalidate_status == "completed"
      if not passed:
          print(json.dumps({
            "status": "failed",
            "validate_status": validate_status,
            "repair_status": repair_status,
            "revalidate_status": revalidate_status,
            "error": "Validation did not pass, even after repair attempt.",
          }))
          sys.exit(1)

      print(json.dumps({
        "status": "passed",
        "validate_status": validate_status,
        "repair_status": repair_status,
        "revalidate_status": revalidate_status,
      }))
      PY
    needs: [validate, repair-after-validate, validate-after-repair]

  - id: review
    type: script
    run: |
      python3 - <<'PY'
      import json
      findings = [item.strip() for item in "{{inputs.review_blocking_findings}}".split(';') if item.strip()]
      print(json.dumps({
        "review_scope": ["{{inputs.affected_files}}"],
        "blocking_findings": findings,
        "non_blocking_findings": [],
        "positive_observations": ["Validation evidence is present"],
        "verdict": "{{inputs.review_verdict}}",
      }))
      PY
    tags: [review-completed]
    needs: [validation-gate]

  - id: commit
    type: script
    run: |
      python3 - <<'PY'
      import json
      import os
      import re
      import subprocess
      import sys

      def parse_json(value, default):
          try:
              return json.loads(value)
          except Exception:
              return default

      def parse_step_payload(raw_output):
          if not raw_output or not isinstance(raw_output, str):
              return {}
          text = raw_output.strip()
          if not text:
              return {}
          try:
              return json.loads(text)
          except Exception:
              return {}

      def run_git(args):
          return subprocess.run(
              ["git", *args],
              capture_output=True,
              text=True,
              timeout=60,
          )

      inputs = parse_json(os.environ.get("ABILITY_INPUTS_JSON", "{}"), {})
      steps = parse_json(os.environ.get("ABILITY_STEP_OUTPUTS_JSON", "{}"), {})

      repo_check = run_git(["rev-parse", "--is-inside-work-tree"])
      if repo_check.returncode != 0 or repo_check.stdout.strip() != "true":
          print(json.dumps({
              "status": "skipped",
              "committed": False,
              "reason": "not a git repository",
          }))
          raise SystemExit(0)

      candidate_files = []
      affected_files = str(inputs.get("affected_files") or "")
      for item in affected_files.split(","):
          cleaned = item.strip()
          if cleaned:
              candidate_files.append(cleaned)

      for step_id in ("execute-small", "execute-complex", "repair-after-validate"):
          payload = parse_step_payload(steps.get(step_id, {}).get("output"))
          for item in payload.get("changed_files", []):
              if isinstance(item, str) and item.strip():
                  candidate_files.append(item.strip())

      ordered_files = []
      seen = set()
      for file_path in candidate_files:
          if file_path not in seen:
              seen.add(file_path)
              ordered_files.append(file_path)

      dirty_files = []
      for file_path in ordered_files:
          status = run_git(["status", "--short", "--", file_path])
          if status.returncode == 0 and status.stdout.strip():
              dirty_files.append(file_path)

      if not dirty_files:
          print(json.dumps({
              "status": "skipped",
              "committed": False,
              "reason": "no workflow-managed diff detected",
              "candidate_files": ordered_files,
          }))
          raise SystemExit(0)

      add = run_git(["add", "-A", "--", *dirty_files])
      if add.returncode != 0:
          print(json.dumps({
              "status": "failed",
              "committed": False,
              "reason": add.stderr.strip() or "git add failed",
              "candidate_files": dirty_files,
          }))
          raise SystemExit(add.returncode)

      staged = run_git(["diff", "--cached", "--quiet", "--", *dirty_files])
      if staged.returncode == 0:
          print(json.dumps({
              "status": "skipped",
              "committed": False,
              "reason": "no staged diff after git add",
              "candidate_files": dirty_files,
          }))
          raise SystemExit(0)

      explicit_message = str(inputs.get("commit_message") or "").strip()
      objective = str(inputs.get("objective") or "").strip()
      if explicit_message:
          commit_message = explicit_message
      else:
          normalized = re.sub(r"\\s+", " ", objective).strip()
          commit_message = f"feat: {normalized}" if normalized else "feat: apply workflow changes"

      commit = run_git(["commit", "-m", commit_message])
      if commit.returncode != 0:
          print(json.dumps({
              "status": "failed",
              "committed": False,
              "reason": commit.stderr.strip() or commit.stdout.strip() or "git commit failed",
              "candidate_files": dirty_files,
              "commit_message": commit_message,
          }))
          raise SystemExit(commit.returncode)

      rev = run_git(["rev-parse", "HEAD"])
      print(json.dumps({
          "status": "committed",
          "committed": True,
          "candidate_files": dirty_files,
          "commit_message": commit_message,
          "commit_sha": rev.stdout.strip() if rev.returncode == 0 else "",
      }))
      PY
    on_failure: continue
    tags: [commit]
    needs: [review]

  - id: complete
    type: script
    run: |
      python3 - <<'PY'
      import json
      import os

      remaining = [item.strip() for item in "{{inputs.dependency_violations}}".split(';') if item.strip()]
      status = "partial" if remaining else "completed"
      next_actions = ["Resolve dependency violations before final completion claim"] if remaining else []
      try:
          steps = json.loads(os.environ.get("ABILITY_STEP_OUTPUTS_JSON", "{}"))
      except Exception:
          steps = {}
      commit_output = steps.get("commit", {}).get("output", "")
      committed = False
      if isinstance(commit_output, str) and commit_output.strip():
          try:
              committed = bool(json.loads(commit_output).get("committed"))
          except Exception:
              committed = False
      print(json.dumps({
        "status": status,
        "validated": True,
        "reviewed": True,
        "committed": committed,
        "remaining_risks": remaining,
        "next_actions": next_actions,
      }))
      PY
    needs: [review, commit]
