name: research/paper-fulltext-review
description: Extract full-text evidence and produce a reusable reading card.
task_type: research_evidence_control

obligations:
  - key: extract_fulltext
    severity: hard
    tags: [fulltext-extract]
  - key: record_reading_card
    severity: hard
    tags: [reading-card]
  - key: task_level_sufficiency_check
    severity: hard
    tags: [task-sufficiency-check]
    signals: [task_level_sufficiency_check]
    requiredFields: [sufficiency_score]
  - key: evidence_grounding
    severity: hard
    tags: [evidence-grounding]
    signals: [evidence_grounding]
    requiredFields: [anchors_count]
  - key: uncertainty_annotation
    severity: hard
    tags: [uncertainty-annotation]
    signals: [uncertainty_annotation]
    requiredFields: [uncertainty_level]
  - key: artifact_lineage_recorded
    severity: hard
    tags: [artifact-lineage]
    signals: [artifact_lineage_recorded]
    requiredFields: [source_stage]

triggers:
  keywords:
    - "/paper-fulltext-review"
    - "paper fulltext review"
    - "paper full-text review"

inputs:
  zotero_key:
    type: string
    required: true

steps:
  - id: read-zotero-pdf
    type: script
    run: |
      set -e
      set -a
      . /home/leslie/code/AgentOS/.env
      set +a
      /home/leslie/code/AgentOS/.venv/bin/agentos zotero-read --key "{{inputs.zotero_key}}"
    tags: [fulltext-extract]

  - id: prepare-reading-input
    type: script
    run: |
      python3 - <<'PY'
      import json
      import os
      import re

      paper_key = "{{inputs.zotero_key}}"
      step_outputs = json.loads(os.environ.get("ABILITY_STEP_OUTPUTS_JSON", "{}"))
      read_step = step_outputs.get("read-zotero-pdf", {})
      raw_output = read_step.get("output") if isinstance(read_step, dict) else ""

      if not isinstance(raw_output, str) or not raw_output.strip():
        raise SystemExit("No full-text output available from read-zotero-pdf")

      try:
        parsed = json.loads(raw_output)
      except Exception:
        parsed = None

      if isinstance(parsed, dict) and isinstance(parsed.get("error"), str) and parsed.get("error").strip():
        raise SystemExit(parsed["error"])

      text = ""
      effective_length = 0
      if isinstance(parsed, dict):
        reported_length = parsed.get("text_length")
        if isinstance(reported_length, int) and reported_length > 0:
          effective_length = reported_length
        for key in ("content", "text", "markdown", "body", "text_preview", "summary", "raw"):
          value = parsed.get(key)
          if isinstance(value, str) and value.strip():
            text = value.strip()
            break
        if not text:
          text = json.dumps(parsed, ensure_ascii=False)
      else:
        text = raw_output.strip()

      text = re.sub(r"\s+", " ", text).strip()
      if not text:
        raise SystemExit("Parsed full-text content is empty")
      if effective_length <= 0:
        effective_length = len(text)

      print(json.dumps({
        "paper_key": paper_key,
        "source_text_length": effective_length,
        "clean_text": text,
        "source_excerpt": text[:4000],
        "anchor_candidates": re.findall(r"(section\s+\d+|table\s+\d+|figure\s+\d+|page\s+\d+|p\.\s*\d+)", text, flags=re.I),
      }))
      PY
    needs: [read-zotero-pdf]

  - id: record-reading-card
    type: agent
    agent: research-synthesizer
    prompt: |
      You are preparing a literature-review reading card for a graduation thesis on integrated supply chain optimization with a MILP baseline and screened advanced extensions.

      Use only the provided prior-step JSON and text.
      Focus on problem setting, optimization method, decision scope, evidence usefulness, and relevance to the thesis.
      Ignore author affiliations, copyright lines, journal boilerplate, and front-matter unless they are directly needed.

      Return strict JSON only with this schema:
      {
        "paper_key": string,
        "title": string,
        "summary": string,
        "key_findings": [string, string, string],
        "methodology": string,
        "relevance_notes": string,
        "anchors_count": number,
        "sufficiency_score": number,
        "uncertainty_level": "low" | "moderate" | "high",
        "source_text_length": number,
        "source_excerpt": string,
        "source_stage": "review",
        "stage": "full-review"
      }

      Requirements:
      - `summary` should be a concise synthesis, not a raw excerpt.
      - `key_findings` should capture problem, method, and why it matters.
      - `methodology` should explicitly name the optimization or learning approach when visible.
      - `relevance_notes` should explain why this paper matters for the thesis literature review.
      - `anchors_count` should reflect visible evidence anchors from the provided text; use at least 1 when the text is usable.
      - `sufficiency_score` must be between 0 and 1.
      - `source_excerpt` should be a short evidentiary excerpt, not the whole front matter.
    tags:
      - reading-card
      - task-sufficiency-check
      - evidence-grounding
      - uncertainty-annotation
      - artifact-lineage
    needs: [prepare-reading-input]
