name: research/paper-fulltext-review
description: Extract full-text evidence and produce a reusable reading card.
task_type: research_evidence_control

obligations:
  - key: extract_fulltext
    severity: hard
    tags: [fulltext-extract]
  - key: record_reading_card
    severity: hard
    tags: [reading-card]
  - key: task_level_sufficiency_check
    severity: hard
    tags: [task-sufficiency-check]
    signals: [task_level_sufficiency_check]
    requiredFields: [sufficiency_score]
  - key: evidence_grounding
    severity: hard
    tags: [evidence-grounding]
    signals: [evidence_grounding]
    requiredFields: [anchors_count]
  - key: uncertainty_annotation
    severity: hard
    tags: [uncertainty-annotation]
    signals: [uncertainty_annotation]
    requiredFields: [uncertainty_level]
  - key: artifact_lineage_recorded
    severity: hard
    tags: [artifact-lineage]
    signals: [artifact_lineage_recorded]
    requiredFields: [source_stage]

triggers:
  keywords:
    - "/paper-fulltext-review"
    - "paper fulltext review"
    - "paper full-text review"

inputs:
  zotero_key:
    type: string
    required: true
  collection_key:
    type: string
    required: false

steps:
  - id: read-zotero-pdf
    type: script
    on_failure: retry
    max_retries: 2
    run: |
      python3 - <<'PY'
      import json
      import os
      import re
      import sys
      import tempfile
      from pathlib import Path

      sys.path.insert(0, "/home/leslie/code/AgentOS/src")

      from agentos.config import load_env
      from agentos.ingest import ingest_url
      from agentos.mineru_adapter import MineruAdapter
      from agentos.providers.http import fetch_bytes
      from agentos.zotero_adapter import ZoteroAdapter

      load_env("/home/leslie/code/AgentOS/.env")

      def normalize_input(value):
        if not isinstance(value, str):
          return ""
        normalized = value.strip()
        if normalized.startswith("{{") and normalized.endswith("}}"):
          return ""
        return normalized

      def is_transient_error(message):
        if not isinstance(message, str):
          return False
        normalized = message.strip().lower()
        transient_markers = (
          "ssl",
          "unexpected eof",
          "eof occurred in violation",
          "timed out",
          "timeout",
          "temporary failure",
          "temporarily unavailable",
          "connection reset",
          "connection aborted",
          "connection refused",
          "service unavailable",
          "bad gateway",
          "http error 429",
          "http error 500",
          "http error 502",
          "http error 503",
          "http error 504",
          "failed to fetch",
        )
        return any(marker in normalized for marker in transient_markers)

      def fail(message, allow_retry=False):
        error_message = (message or "Unknown full-text acquisition error").strip()
        if allow_retry and is_transient_error(error_message):
          raise RuntimeError(error_message)
        raise SystemExit(error_message)

      item_key = normalize_input("{{inputs.zotero_key}}")
      requested_collection_key = normalize_input("{{inputs.collection_key}}")
      default_collection_key = os.environ.get("BIBLIOGRAPHY_DEFAULT_COLLECTION_KEY", "").strip()
      target_collection_key = requested_collection_key or default_collection_key

      def make_slug(text):
        value = re.sub(r"[^a-z0-9]+", "-", (text or "").lower()).strip("-")
        return value[:80] if value else "paper"

      zotero = ZoteroAdapter.from_env()
      item_result = zotero.get_item(item_key=item_key)
      item = item_result.get("item") if isinstance(item_result, dict) else None
      if isinstance(item_result, dict) and isinstance(item_result.get("error"), str) and item_result.get("error").strip():
        fail(item_result["error"], allow_retry=True)
      if not isinstance(item, dict):
        fail(f"Zotero item not found for {item_key}")

      item_data = item.get("data", {}) or {}
      title = item_data.get("title", "") or item_key
      source_url = item_data.get("url", "") or f"https://www.zotero.org/users/{zotero.cfg.user_id}/items/{item_key}"
      collections = item_data.get("collections", [])
      if not isinstance(collections, list):
        collections = []

      collection_update = None
      if target_collection_key and target_collection_key not in collections:
        collection_update = zotero.add_to_collection(item_key=item_key, collection_key=target_collection_key)
        if isinstance(collection_update, dict) and not collection_update.get("error"):
          collections = sorted({*collections, target_collection_key})

      markdown_dir = Path("/home/leslie/code/AgentOS/kb/markdown")
      markdown_dir.mkdir(parents=True, exist_ok=True)
      output_stub = f"{make_slug(title)}-{item_key.lower()}"

      def load_text(path_str):
        if not path_str:
          return ""
        path = Path(path_str)
        if not path.exists():
          return ""
        try:
          return path.read_text(encoding="utf-8")
        except Exception:
          return ""

      remote_web = {}
      if isinstance(item_data.get("url"), str) and item_data.get("url", "").startswith(("http://", "https://")):
        remote_web = ingest_url(
          item_data["url"],
          tags=["thesis-bibliography", "remote-fulltext", f"zotero:{item_key}"],
        )

      remote_pdf = {}
      attachment = zotero._best_pdf_attachment(item_key=item_key)
      if attachment:
        attachment_key = attachment.get("key", "")
        attachment_data = attachment.get("data", {}) or {}
        markdown_path = markdown_dir / f"{output_stub}.md"
        markdown_text = load_text(str(markdown_path))
        if markdown_text:
          remote_pdf = {
            "source": "mineru-cache",
            "attachment_key": attachment_key,
            "markdown_path": str(markdown_path),
            "markdown": markdown_text,
          }
        else:
          raw = fetch_bytes(
            f"{zotero.cfg.api_base}/users/{zotero.cfg.user_id}/items/{attachment_key}/file",
            headers={"Zotero-API-Key": zotero.cfg.api_key},
            timeout=60,
          )
          source = "zotero-api-file"
          if not raw:
            attachment_url = attachment_data.get("url", "")
            if isinstance(attachment_url, str) and attachment_url:
              raw = fetch_bytes(attachment_url, timeout=60)
              if raw:
                source = "attachment-url"
          if not raw:
            local_pdf = zotero._resolve_local_attachment_path(attachment)
            if local_pdf:
              try:
                raw = Path(local_pdf).read_bytes()
                source = "zotero-local-storage"
              except Exception:
                raw = b""
          if raw:
            tmp_path = ""
            try:
              with tempfile.NamedTemporaryFile(suffix=".pdf", delete=False) as handle:
                handle.write(raw)
                tmp_path = handle.name
              mineru = MineruAdapter.from_env()
              extraction = mineru.extract_file(
                file_path=tmp_path,
                timeout=600,
                poll_interval=8,
                save_markdown_path=str(markdown_path),
              )
              if isinstance(extraction, dict) and not extraction.get("error"):
                remote_pdf = {
                  "source": source,
                  "attachment_key": attachment_key,
                  "markdown_path": extraction.get("saved_to") or str(markdown_path),
                  "markdown": extraction.get("markdown") or load_text(str(markdown_path)),
                }
              else:
                remote_pdf = {
                  "error": extraction.get("error") if isinstance(extraction, dict) else "MinerU extraction failed",
                  "attachment_key": attachment_key,
                }
            finally:
              if tmp_path:
                try:
                  Path(tmp_path).unlink(missing_ok=True)
                except Exception:
                  pass

      fallback_pdf = zotero.read_pdf(item_key=item_key)
      candidate_sources = []
      if isinstance(remote_pdf, dict) and isinstance(remote_pdf.get("markdown"), str) and remote_pdf.get("markdown", "").strip():
        candidate_sources.append({
          "label": "mineru-markdown",
          "text": remote_pdf["markdown"],
          "path": remote_pdf.get("markdown_path", ""),
        })
      if isinstance(remote_web, dict) and isinstance(remote_web.get("path"), str):
        remote_web_text = load_text(remote_web["path"])
        if remote_web_text.strip():
          candidate_sources.append({
            "label": "remote-web-ingest",
            "text": remote_web_text,
            "path": remote_web.get("path", ""),
          })
      if isinstance(fallback_pdf, dict) and isinstance(fallback_pdf.get("text_preview"), str) and fallback_pdf.get("text_preview", "").strip():
        candidate_sources.append({
          "label": "zotero-read",
          "text": fallback_pdf["text_preview"],
          "path": fallback_pdf.get("local_pdf_path", ""),
        })

      if not candidate_sources:
        error_messages = []
        for payload in (remote_pdf, remote_web, fallback_pdf):
          if isinstance(payload, dict) and isinstance(payload.get("error"), str) and payload.get("error", "").strip():
            error_messages.append(payload["error"].strip())
        transient_error = next((message for message in error_messages if is_transient_error(message)), None)
        if transient_error:
          fail(transient_error, allow_retry=True)
        fail(error_messages[0] if error_messages else "No usable full-text content found")

      selected = candidate_sources[0]
      clean_text = re.sub(r"\s+", " ", selected["text"]).strip()
      print(json.dumps({
        "paper_key": item_key,
        "item_key": item_key,
        "title": title,
        "source_url": source_url,
        "collection_key": target_collection_key,
        "collections": collections,
        "collection_update": collection_update,
        "selected_source": selected["label"],
        "source_markdown_path": selected.get("path", ""),
        "content": clean_text[:12000],
        "text_length": len(clean_text),
        "source_excerpt": clean_text[:4000],
        "remote_web": {
          "path": remote_web.get("path"),
          "provider": remote_web.get("provider"),
          "char_count": remote_web.get("char_count"),
        } if isinstance(remote_web, dict) and not remote_web.get("error") else {"error": remote_web.get("error")} if isinstance(remote_web, dict) and remote_web else {},
        "remote_pdf": {
          "source": remote_pdf.get("source"),
          "markdown_path": remote_pdf.get("markdown_path"),
          "attachment_key": remote_pdf.get("attachment_key"),
        } if isinstance(remote_pdf, dict) and remote_pdf.get("markdown") else {"error": remote_pdf.get("error")} if isinstance(remote_pdf, dict) and remote_pdf else {},
        "fallback_pdf": {
          "source": fallback_pdf.get("source"),
          "attachment_key": fallback_pdf.get("attachment_key"),
          "extraction_status": fallback_pdf.get("extraction_status"),
        } if isinstance(fallback_pdf, dict) else {},
      }))
      PY
    tags: [fulltext-extract]

  - id: prepare-reading-input
    type: script
    run: |
      python3 - <<'PY'
      import json
      import os
      import re

      paper_key = "{{inputs.zotero_key}}"
      step_outputs = json.loads(os.environ.get("ABILITY_STEP_OUTPUTS_JSON", "{}"))
      read_step = step_outputs.get("read-zotero-pdf", {})
      raw_output = read_step.get("output") if isinstance(read_step, dict) else ""

      if not isinstance(raw_output, str) or not raw_output.strip():
        raise SystemExit("No full-text output available from read-zotero-pdf")

      try:
        parsed = json.loads(raw_output)
      except Exception:
        parsed = None

      if isinstance(parsed, dict) and isinstance(parsed.get("error"), str) and parsed.get("error").strip():
        raise SystemExit(parsed["error"])

      text = ""
      effective_length = 0
      if isinstance(parsed, dict):
        reported_length = parsed.get("text_length")
        if isinstance(reported_length, int) and reported_length > 0:
          effective_length = reported_length
        for key in ("content", "text", "markdown", "body", "text_preview", "summary", "raw"):
          value = parsed.get(key)
          if isinstance(value, str) and value.strip():
            text = value.strip()
            break
        if not text:
          text = json.dumps(parsed, ensure_ascii=False)
      else:
        text = raw_output.strip()

      text = re.sub(r"\s+", " ", text).strip()
      if not text:
        raise SystemExit("Parsed full-text content is empty")
      if effective_length <= 0:
        effective_length = len(text)

      print(json.dumps({
        "paper_key": paper_key,
        "source_text_length": effective_length,
        "clean_text": text,
        "source_excerpt": text[:4000],
        "anchor_candidates": re.findall(r"(section\s+\d+|table\s+\d+|figure\s+\d+|page\s+\d+|p\.\s*\d+)", text, flags=re.I),
      }))
      PY
    needs: [read-zotero-pdf]

  - id: record-reading-card
    type: agent
    agent: research-synthesizer
    prompt: |
      You are preparing a literature-review reading card for a graduation thesis on integrated supply chain optimization with a MILP baseline and screened advanced extensions.

      Use only the provided prior-step JSON and text.
      Focus on problem setting, optimization method, decision scope, evidence usefulness, and relevance to the thesis.
      Ignore author affiliations, copyright lines, journal boilerplate, and front-matter unless they are directly needed.

      Return strict JSON only with this schema:
      {
        "paper_key": string,
        "title": string,
        "summary": string,
        "key_findings": [string, string, string],
        "methodology": string,
        "relevance_notes": string,
        "anchors_count": number,
        "sufficiency_score": number,
        "uncertainty_level": "low" | "moderate" | "high",
        "source_text_length": number,
        "source_excerpt": string,
        "source_stage": "review",
        "stage": "full-review"
      }

      Requirements:
      - `summary` should be a concise synthesis, not a raw excerpt.
      - `key_findings` should capture problem, method, and why it matters.
      - `methodology` should explicitly name the optimization or learning approach when visible.
      - `relevance_notes` should explain why this paper matters for the thesis literature review.
      - `anchors_count` should reflect visible evidence anchors from the provided text; use at least 1 when the text is usable.
      - `sufficiency_score` must be between 0 and 1.
      - `source_excerpt` should be a short evidentiary excerpt, not the whole front matter.
    tags:
      - reading-card
      - task-sufficiency-check
      - evidence-grounding
      - uncertainty-annotation
      - artifact-lineage
    needs: [prepare-reading-input]
