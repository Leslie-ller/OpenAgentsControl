name: research/paper-screening
description: Screen candidate papers into keep, defer, or reject with auditable output.
task_type: research_evidence_control

obligations:
  - key: record_screening_decision
    severity: hard
    tags: [screening-decision]
  - key: task_level_sufficiency_check
    severity: hard
    tags: [task-sufficiency-check]
    signals: [task_level_sufficiency_check]
    requiredFields: [sufficiency_score]
  - key: evidence_grounding
    severity: hard
    tags: [evidence-grounding]
    signals: [evidence_grounding]
    requiredFields: [anchors_count]
  - key: uncertainty_annotation
    severity: hard
    tags: [uncertainty-annotation]
    signals: [uncertainty_annotation]
    requiredFields: [uncertainty_level]
  - key: artifact_lineage_recorded
    severity: hard
    tags: [artifact-lineage]
    signals: [artifact_lineage_recorded]
    requiredFields: [source_stage]

triggers:
  keywords:
    - "/paper-screening"
    - "paper screening"

inputs:
  query:
    type: string
    required: true
  limit:
    type: number
    required: false
    default: 10

steps:
  - id: derive-search-profile
    type: script
    run: |
      python3 - <<'PY'
      import json
      import os
      import re

      query = "{{inputs.query}}".strip()
      stage_outputs = json.loads(os.environ.get("ABILITY_STAGE_OUTPUTS_JSON", "{}"))

      GENERIC_QUERY_TOKENS = {
        "analysis", "approach", "approaches", "background", "chapter", "chapters",
        "dissertation", "graduate", "graduation", "introduction", "literature",
        "mapping", "master", "overview", "paper", "papers", "related", "research",
        "review", "reviews", "section", "sections", "state", "study", "studies",
        "survey", "surveys", "systematic", "thesis", "work", "works",
        "baseline", "extension", "extensions",
      }

      def tokenize(text):
        if not isinstance(text, str):
          return []
        return re.findall(r"[a-z0-9]+", text.lower())

      def normalize_token(token):
        if len(token) > 4 and token.endswith("ies"):
          return token[:-3] + "y"
        if len(token) > 5 and token.endswith("ing"):
          return token[:-3]
        if len(token) > 4 and token.endswith("s") and not token.endswith("sis"):
          return token[:-1]
        return token

      def unique(items):
        seen = set()
        ordered = []
        for item in items:
          if not isinstance(item, str):
            continue
          value = item.strip()
          if not value or value in seen:
            continue
          seen.add(value)
          ordered.append(value)
        return ordered

      def normalize_terms(values):
        if not isinstance(values, list):
          return []
        terms = []
        seen = set()
        for value in values:
          if not isinstance(value, str):
            continue
          normalized = normalize_token(value.strip().lower())
          if len(normalized) < 4 or normalized in seen:
            continue
          seen.add(normalized)
          terms.append(normalized)
        return terms

      def normalize_phrases(values):
        if not isinstance(values, list):
          return []
        phrases = []
        seen = set()
        for value in values:
          if not isinstance(value, str):
            continue
          tokens = [normalize_token(token) for token in tokenize(value)]
          tokens = [token for token in tokens if len(token) >= 4]
          if len(tokens) < 2:
            continue
          phrase = " ".join(tokens)
          if phrase in seen:
            continue
          seen.add(phrase)
          phrases.append(phrase)
        return phrases

      def derive_focus_terms(text):
        terms = []
        seen = set()
        for token in tokenize(text):
          normalized = normalize_token(token)
          if len(normalized) < 4 or normalized in GENERIC_QUERY_TOKENS or normalized in seen:
            continue
          seen.add(normalized)
          terms.append(normalized)
        return terms

      plans = stage_outputs.get("plan", [])
      selected_plan = plans[0] if isinstance(plans, list) and plans and isinstance(plans[0], dict) else {}
      search_profile = selected_plan.get("search_profile") if isinstance(selected_plan, dict) and isinstance(selected_plan.get("search_profile"), dict) else {}

      normalized_focus_query = (
        search_profile.get("normalized_focus_query")
        if isinstance(search_profile.get("normalized_focus_query"), str)
        else query
      )
      search_queries = unique(search_profile.get("search_queries") if isinstance(search_profile.get("search_queries"), list) else [])
      if not search_queries:
        search_queries = [normalized_focus_query or query]
      search_queries = search_queries[:4]

      required_terms = normalize_terms(search_profile.get("required_terms"))
      support_terms = normalize_terms(search_profile.get("support_terms"))
      required_phrases = normalize_phrases(search_profile.get("required_phrases"))
      excluded_terms = normalize_terms(search_profile.get("excluded_terms"))

      if not required_terms:
        fallback_terms = derive_focus_terms(normalized_focus_query or query)
        required_terms = fallback_terms[:2] if len(fallback_terms) >= 2 else fallback_terms[:1]
        support_terms = [term for term in fallback_terms if term not in required_terms][:3]
      if not required_phrases and isinstance(normalized_focus_query, str) and len(normalized_focus_query.split()) >= 2:
        required_phrases = normalize_phrases([normalized_focus_query])

      screening_hints = search_profile.get("screening_hints") if isinstance(search_profile.get("screening_hints"), dict) else {}

      print(json.dumps({
        "plan_applied": bool(search_profile),
        "topic": selected_plan.get("topic") if isinstance(selected_plan, dict) else query,
        "normalized_focus_query": normalized_focus_query or query,
        "search_queries": search_queries,
        "required_terms": required_terms,
        "support_terms": support_terms,
        "required_phrases": required_phrases,
        "excluded_terms": excluded_terms,
        "screening_hints": screening_hints,
      }))
      PY

  - id: search-academic
    type: script
    needs: [derive-search-profile]
    timeout: 90s
    run: |
      python3 - <<'PY'
      import json
      import os
      import subprocess

      limit = int("{{inputs.limit}}")
      step_outputs = json.loads(os.environ.get("ABILITY_STEP_OUTPUTS_JSON", "{}"))
      agentos_bin = "/home/leslie/code/AgentOS/.venv/bin/agentos"

      def load_step_output(step_id):
        payload = step_outputs.get(step_id, {})
        raw = payload.get("output") if isinstance(payload, dict) else None
        if not isinstance(raw, str) or not raw.strip():
          return {}
        try:
          parsed = json.loads(raw)
          return parsed if isinstance(parsed, dict) else {"value": parsed}
        except Exception:
          return {"raw": raw}

      search_profile = load_step_output("derive-search-profile")
      search_queries = search_profile.get("search_queries", [])
      if not isinstance(search_queries, list) or not search_queries:
        search_queries = ["{{inputs.query}}"]

      per_query_limit = min(max(limit, 4), 8)
      candidate_cap = max(limit * 3, 12)
      results = []
      warnings = []
      seen = set()

      for search_query in search_queries:
        if not isinstance(search_query, str) or not search_query.strip():
          continue
        completed = subprocess.run(
          [
            "timeout", "15s", agentos_bin, "search",
            "--mode", "academic",
            "--query", search_query,
            "--limit", str(per_query_limit),
          ],
          capture_output=True,
          text=True,
        )
        if completed.returncode != 0:
          warning = completed.stderr.strip() or completed.stdout.strip() or f"search failed for query '{search_query}'"
          warnings.append(warning)
          continue
        try:
          parsed = json.loads(completed.stdout)
        except Exception:
          warnings.append(f"invalid academic search payload for query '{search_query}'")
          continue
        if not isinstance(parsed, dict):
          continue
        for result in parsed.get("results", []):
          if not isinstance(result, dict):
            continue
          key = (
            result.get("doi")
            or result.get("id")
            or result.get("url")
            or result.get("title")
          )
          if not isinstance(key, str) or not key.strip():
            key = json.dumps(result, sort_keys=True)
          if key in seen:
            continue
          seen.add(key)
          enriched = dict(result)
          enriched["_matched_query"] = search_query
          results.append(enriched)
          if len(results) >= candidate_cap:
            break
        if len(results) >= candidate_cap:
          break

      warning_text = "; ".join(warnings) if warnings else None
      print(json.dumps({
        "query": "{{inputs.query}}",
        "result_count": len(results),
        "results": results,
        "queries_used": search_queries,
        "warning": warning_text,
        "plan_applied": bool(search_profile.get("plan_applied")),
      }))
      PY

  - id: search-zotero
    type: script
    needs: [search-academic]
    timeout: 90s
    run: |
      python3 - <<'PY'
      import json
      import os
      import shlex
      import subprocess

      limit = int("{{inputs.limit}}")
      step_outputs = json.loads(os.environ.get("ABILITY_STEP_OUTPUTS_JSON", "{}"))
      agentos_bin = "/home/leslie/code/AgentOS/.venv/bin/agentos"
      env_file = "/home/leslie/code/AgentOS/.env"

      def load_step_output(step_id):
        payload = step_outputs.get(step_id, {})
        raw = payload.get("output") if isinstance(payload, dict) else None
        if not isinstance(raw, str) or not raw.strip():
          return {}
        try:
          parsed = json.loads(raw)
          return parsed if isinstance(parsed, dict) else {"value": parsed}
        except Exception:
          return {"raw": raw}

      search_profile = load_step_output("derive-search-profile")
      search_queries = search_profile.get("search_queries", [])
      if not isinstance(search_queries, list) or not search_queries:
        search_queries = ["{{inputs.query}}"]

      per_query_limit = min(max(limit, 4), 8)
      candidate_cap = max(limit * 2, 10)
      items = []
      warnings = []
      seen = set()

      for search_query in search_queries:
        if not isinstance(search_query, str) or not search_query.strip():
          continue
        command = (
          f"set -e; set -a; . {shlex.quote(env_file)}; set +a; "
          f"{shlex.quote(agentos_bin)} zotero-search --query {shlex.quote(search_query)} --limit {per_query_limit}"
        )
        completed = subprocess.run(
          ["bash", "-lc", command],
          capture_output=True,
          text=True,
        )
        if completed.returncode != 0:
          warning = completed.stderr.strip() or completed.stdout.strip() or f"zotero search failed for query '{search_query}'"
          warnings.append(warning)
          continue
        try:
          parsed = json.loads(completed.stdout)
        except Exception:
          warnings.append(f"invalid zotero search payload for query '{search_query}'")
          continue
        if not isinstance(parsed, dict):
          continue
        for item in parsed.get("items", []):
          if not isinstance(item, dict):
            continue
          key = item.get("key") or item.get("url") or item.get("title")
          if not isinstance(key, str) or not key.strip():
            key = json.dumps(item, sort_keys=True)
          if key in seen:
            continue
          seen.add(key)
          enriched = dict(item)
          enriched["_matched_query"] = search_query
          items.append(enriched)
          if len(items) >= candidate_cap:
            break
        if len(items) >= candidate_cap:
          break

      warning_text = "; ".join(warnings) if warnings else None
      print(json.dumps({
        "query": "{{inputs.query}}",
        "result_count": len(items),
        "items": items,
        "queries_used": search_queries,
        "warning": warning_text,
        "plan_applied": bool(search_profile.get("plan_applied")),
      }))
      PY

  - id: record-screening-decision
    type: script
    run: |
      python3 - <<'PY'
      import hashlib
      import json
      import os
      import re

      query = "{{inputs.query}}".strip()
      limit = int("{{inputs.limit}}")
      step_outputs = json.loads(os.environ.get("ABILITY_STEP_OUTPUTS_JSON", "{}"))

      GENERIC_QUERY_TOKENS = {
        "about", "after", "analysis", "approach", "approaches", "article", "articles",
        "based", "between", "case", "comparison", "design", "effect", "effects",
        "evaluation", "framework", "frameworks", "general", "impact", "implications",
        "introduction", "method", "methods", "model", "models", "overview", "paper",
        "papers", "query", "queries", "result", "results", "review", "reviews",
        "study", "studies", "survey", "surveys", "system", "systems", "thesis",
        "topic", "topics", "using", "with", "without",
      }

      def load_step_output(step_id):
        payload = step_outputs.get(step_id, {})
        raw = payload.get("output") if isinstance(payload, dict) else None
        if not isinstance(raw, str) or not raw.strip():
          return {}
        try:
          parsed = json.loads(raw)
          return parsed if isinstance(parsed, dict) else {"value": parsed}
        except Exception:
          return {"raw": raw}

      def tokenize(text):
        if not isinstance(text, str):
          return []
        return re.findall(r"[a-z0-9]+", text.lower())

      def normalize_token(token):
        if len(token) > 4 and token.endswith("ies"):
          return token[:-3] + "y"
        if len(token) > 5 and token.endswith("ing"):
          return token[:-3]
        if len(token) > 4 and token.endswith("s") and not token.endswith("sis"):
          return token[:-1]
        return token

      def extract_query_tokens(text):
        tokens = []
        seen = set()
        for token in tokenize(text):
          normalized = normalize_token(token)
          if len(normalized) < 4 or normalized in GENERIC_QUERY_TOKENS or normalized in seen:
            continue
          seen.add(normalized)
          tokens.append(normalized)
        return tokens

      def normalized_tokens_from_text(text):
        return [normalize_token(token) for token in tokenize(text)]

      def normalized_text(text):
        return " ".join(normalized_tokens_from_text(text))

      def extract_result_fields(result):
        title = result.get("title") if isinstance(result.get("title"), str) else ""
        support_fields = []
        for value in (
          result.get("snippet"),
          result.get("abstract"),
          result.get("summary"),
        ):
          if isinstance(value, str) and value.strip():
            support_fields.append(value)
        metadata = result.get("metadata", {})
        if isinstance(metadata, dict):
          for key in ("keywords", "concepts", "topics"):
            values = metadata.get(key)
            if isinstance(values, list):
              for item in values:
                if isinstance(item, str) and item.strip():
                  support_fields.append(item)
                elif isinstance(item, dict):
                  name = item.get("display_name") or item.get("name")
                  if isinstance(name, str) and name.strip():
                    support_fields.append(name)
        title_tokens = set(normalized_tokens_from_text(title))
        support_text = " ".join(support_fields)
        support_tokens = set(normalized_tokens_from_text(support_text))
        return title_tokens, support_tokens, bool(support_fields), normalized_text(title), normalized_text(support_text)

      def normalize_terms(values):
        if not isinstance(values, list):
          return []
        terms = []
        seen = set()
        for value in values:
          if not isinstance(value, str):
            continue
          normalized = normalize_token(value.strip().lower())
          if len(normalized) < 4 or normalized in seen:
            continue
          seen.add(normalized)
          terms.append(normalized)
        return terms

      def normalize_phrases(values):
        if not isinstance(values, list):
          return []
        phrases = []
        seen = set()
        for value in values:
          if not isinstance(value, str):
            continue
          tokens = [normalize_token(token) for token in tokenize(value)]
          tokens = [token for token in tokens if len(token) >= 4]
          if len(tokens) < 2:
            continue
          phrase = " ".join(tokens)
          if phrase in seen:
            continue
          seen.add(phrase)
          phrases.append(phrase)
        return phrases

      def phrase_matches(phrase, title_text, support_text):
        return phrase in title_text or phrase in support_text

      def is_relevant_academic_result(result, required_terms, support_terms, required_phrases):
        anchor_terms = required_terms or support_terms
        if not anchor_terms:
          return True
        title_tokens, support_tokens, has_support_fields, title_text, support_text = extract_result_fields(result)
        if required_phrases and not any(phrase_matches(phrase, title_text, support_text) for phrase in required_phrases):
          return False
        overlap = [token for token in anchor_terms if token in title_tokens or token in support_tokens]
        min_anchor_matches = 2 if len(anchor_terms) >= 2 else 1
        if len(overlap) < min_anchor_matches:
          return False
        support_overlap = [token for token in anchor_terms if token in support_tokens]
        if len(anchor_terms) == 1:
          return True
        if len(support_overlap) >= 1:
          return True
        if not has_support_fields:
          return True
        return False

      def make_paper_key(prefix, candidate):
        for source in (
          candidate.get("paper_key"),
          candidate.get("key"),
          candidate.get("id"),
          candidate.get("url"),
          candidate.get("doi"),
          candidate.get("title"),
        ):
          if isinstance(source, str) and source.strip():
            safe = "".join(ch if ch.isalnum() else "_" for ch in source.strip().lower())
            safe = "_".join(part for part in safe.split("_") if part)
            if safe:
              return f"{prefix}_{safe[:64]}"
        digest = hashlib.sha1(json.dumps(candidate, sort_keys=True).encode("utf-8")).hexdigest()[:12]
        return f"{prefix}_{digest}"

      search_profile = load_step_output("derive-search-profile")
      academic = load_step_output("search-academic")
      zotero = load_step_output("search-zotero")
      items = []
      seen = set()
      required_terms = normalize_terms(search_profile.get("required_terms"))
      support_terms = normalize_terms(search_profile.get("support_terms"))
      required_phrases = normalize_phrases(search_profile.get("required_phrases"))
      search_queries = search_profile.get("search_queries") if isinstance(search_profile.get("search_queries"), list) else []
      normalized_focus_query = search_profile.get("normalized_focus_query") if isinstance(search_profile.get("normalized_focus_query"), str) else query
      if not required_terms and not support_terms:
        fallback_terms = extract_query_tokens(normalized_focus_query or query)
        required_terms = fallback_terms[:2] if len(fallback_terms) >= 2 else fallback_terms[:1]
        support_terms = [token for token in fallback_terms if token not in required_terms][:3]
      if not required_phrases and isinstance(normalized_focus_query, str) and len(normalized_focus_query.split()) >= 2:
        required_phrases = normalize_phrases([normalized_focus_query])
      filtered_academic_count = 0
      academic_candidates = academic.get("results", [])
      zotero_candidates = zotero.get("items", [])
      candidate_pool_limit = max(limit * 3, 12)

      for result in academic_candidates[:candidate_pool_limit]:
        if not isinstance(result, dict):
          continue
        if not is_relevant_academic_result(result, required_terms, support_terms, required_phrases):
          filtered_academic_count += 1
          continue
        paper_key = make_paper_key("academic", result)
        if paper_key in seen:
          continue
        seen.add(paper_key)
        snippet = result.get("snippet") if isinstance(result.get("snippet"), str) else ""
        provider = result.get("provider") if isinstance(result.get("provider"), str) else "academic"
        title = result.get("title") if isinstance(result.get("title"), str) else paper_key
        matched_query = result.get("_matched_query") if isinstance(result.get("_matched_query"), str) else normalized_focus_query
        items.append({
          "paper_key": paper_key,
          "title": title,
          "decision": "defer",
          "reason": snippet or f"Matched planned {provider} query '{matched_query}'.",
          "role": "candidate evidence",
          "recommended_usage": "requires review",
          "limitations": "Search-stage result only; full text not yet reviewed.",
          "query": query,
          "matched_query": matched_query,
          "source": provider,
          "source_url": result.get("url"),
          "metadata": result.get("metadata", {}),
        })
        if len(items) >= limit:
          break

      for result in zotero_candidates[:candidate_pool_limit]:
        if not isinstance(result, dict):
          continue
        raw_zotero_key = result.get("key") if isinstance(result.get("key"), str) else ""
        paper_key = raw_zotero_key.strip() or make_paper_key("zotero", result)
        if paper_key in seen:
          continue
        seen.add(paper_key)
        title = result.get("title") if isinstance(result.get("title"), str) else paper_key
        matched_query = result.get("_matched_query") if isinstance(result.get("_matched_query"), str) else normalized_focus_query
        items.append({
          "paper_key": paper_key,
          "zotero_key": raw_zotero_key.strip() or paper_key,
          "title": title,
          "decision": "keep",
          "reason": "Existing Zotero item available for follow-up review.",
          "role": "review-ready candidate",
          "recommended_usage": "fulltext review",
          "limitations": "Content trust still depends on downstream review.",
          "query": query,
          "matched_query": matched_query,
          "source": "zotero",
          "metadata": result,
        })
        if len(items) >= limit:
          break

      result_count = len(items)
      if result_count == 0:
          sufficiency_score = 0.25
          uncertainty_level = "high"
      elif result_count == 1:
          sufficiency_score = 0.62
          uncertainty_level = "partial"
      elif result_count == 2:
          sufficiency_score = 0.72
          uncertainty_level = "partial"
      else:
          sufficiency_score = 0.82
          uncertainty_level = "moderate"

      warnings = []
      academic_warning = academic.get("warning")
      zotero_warning = zotero.get("warning")
      if isinstance(academic_warning, str) and academic_warning.strip():
        warnings.append({
          "code": "academic-search-warning",
          "severity": "warning",
          "message": academic_warning.strip(),
        })
      if isinstance(zotero_warning, str) and zotero_warning.strip():
        warnings.append({
          "code": "zotero-search-warning",
          "severity": "warning",
          "message": zotero_warning.strip(),
        })
      if bool(search_profile.get("plan_applied")) and result_count == 0:
        warnings.append({
          "code": "planned-search-no-results",
          "severity": "warning",
          "message": "Plan-driven search completed but produced no usable screening candidates.",
        })
      elif result_count > 0 and result_count < min(limit, 3):
        warnings.append({
          "code": "limited-screening-results",
          "severity": "info",
          "message": "Only a small number of screening candidates were found for the current search direction.",
        })

      screening_status = "ready"
      if any(warning["code"] == "planned-search-no-results" for warning in warnings):
        screening_status = "degraded"
      elif any(warning["severity"] == "warning" for warning in warnings):
        screening_status = "degraded"
      elif any(warning["code"] == "limited-screening-results" for warning in warnings):
        screening_status = "partial"

      print(json.dumps({
        "items": items,
        "screening_status": screening_status,
        "sufficiency_score": sufficiency_score,
        "anchors_count": result_count,
        "uncertainty_level": uncertainty_level,
        "search_summary": {
          "academic_result_count": academic.get("result_count"),
          "zotero_result_count": zotero.get("result_count"),
          "academic_warning": academic.get("warning"),
          "zotero_warning": zotero.get("warning"),
          "filtered_academic_result_count": filtered_academic_count,
          "plan_applied": bool(search_profile.get("plan_applied")),
          "planned_query_count": len(search_queries),
          "academic_queries_used": academic.get("queries_used", search_queries),
          "zotero_queries_used": zotero.get("queries_used", search_queries),
          "required_terms": required_terms,
          "support_terms": support_terms,
          "required_phrases": required_phrases,
          "warning_count": len(warnings),
        },
        "search_profile": {
          "plan_applied": bool(search_profile.get("plan_applied")),
          "normalized_focus_query": normalized_focus_query,
          "search_queries": search_queries,
          "required_terms": required_terms,
          "support_terms": support_terms,
          "required_phrases": required_phrases,
        },
        "warnings": warnings,
        "source_stage": "screening",
      }))
      PY
    tags:
      - screening-decision
      - task-sufficiency-check
      - evidence-grounding
      - uncertainty-annotation
      - artifact-lineage
    needs: [search-zotero]
