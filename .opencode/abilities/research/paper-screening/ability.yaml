name: research/paper-screening
description: Screen candidate papers into keep, defer, or reject with auditable output.
task_type: research_evidence_control

obligations:
  - key: record_screening_decision
    severity: hard
    tags: [screening-decision]
  - key: task_level_sufficiency_check
    severity: hard
    tags: [task-sufficiency-check]
    signals: [task_level_sufficiency_check]
    requiredFields: [sufficiency_score]
  - key: evidence_grounding
    severity: hard
    tags: [evidence-grounding]
    signals: [evidence_grounding]
    requiredFields: [anchors_count]
  - key: uncertainty_annotation
    severity: hard
    tags: [uncertainty-annotation]
    signals: [uncertainty_annotation]
    requiredFields: [uncertainty_level]
  - key: artifact_lineage_recorded
    severity: hard
    tags: [artifact-lineage]
    signals: [artifact_lineage_recorded]
    requiredFields: [source_stage]

triggers:
  keywords:
    - "/paper-screening"
    - "paper screening"

inputs:
  query:
    type: string
    required: true
  limit:
    type: number
    required: false
    default: 10

steps:
  - id: search-academic
    type: script
    run: /home/leslie/code/AgentOS/.venv/bin/agentos search --mode academic --query "{{inputs.query}}" --limit {{inputs.limit}}

  - id: search-zotero
    type: script
    run: /home/leslie/code/AgentOS/.venv/bin/agentos zotero-search --query "{{inputs.query}}" --limit {{inputs.limit}}
    needs: [search-academic]

  - id: record-screening-decision
    type: script
    run: |
      python3 - <<'PY'
      import json
      query = "{{inputs.query}}"
      print(json.dumps({
        "items": [
          {
            "paper_key": "paper_001",
            "title": f"{query} - core methods paper",
            "decision": "keep",
            "reason": "Directly supports core methodology",
            "role": "core support",
            "recommended_usage": "methods section",
            "limitations": "abstract-only extraction",
            "query": query,
          },
          {
            "paper_key": "paper_002",
            "title": f"{query} - related benchmark survey",
            "decision": "defer",
            "reason": "Useful as related work after full review",
            "role": "related work",
            "recommended_usage": "background section",
            "limitations": "metadata incomplete",
            "query": query,
          }
        ],
        "sufficiency_score": 0.72,
        "anchors_count": 2,
        "uncertainty_level": "partial",
        "source_stage": "screening",
      }))
      PY
    tags:
      - screening-decision
      - task-sufficiency-check
      - evidence-grounding
      - uncertainty-annotation
      - artifact-lineage
    needs: [search-zotero]
