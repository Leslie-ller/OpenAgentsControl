name: research/section-evidence-pack
description: Assemble section-level evidence packs from reviewed literature artifacts.
task_type: research_evidence_control

obligations:
  - key: record_evidence_pack
    severity: hard
    tags: [evidence-pack]
  - key: evidence_grounding
    severity: hard
    tags: [evidence-grounding]
    signals: [evidence_grounding]
    requiredFields: [anchors_count]
  - key: task_level_sufficiency_check
    severity: hard
    tags: [task-sufficiency-check]
    signals: [task_level_sufficiency_check]
    requiredFields: [sufficiency_score]
  - key: artifact_lineage_recorded
    severity: hard
    tags: [artifact-lineage]
    signals: [artifact_lineage_recorded]
    requiredFields: [source_stage]

triggers:
  keywords:
    - "/section-evidence-pack"
    - "section evidence pack"

inputs:
  section:
    type: string
    required: true
  paper_keys:
    type: array
    required: false

steps:
  - id: prepare-evidence-pack-input
    type: script
    run: |
      python3 - <<'PY'
      import json
      import os

      section = "{{inputs.section}}"
      stage_outputs = json.loads(os.environ.get("ABILITY_STAGE_OUTPUTS_JSON", "{}"))
      decisions = stage_outputs.get("decision", [])
      if not isinstance(decisions, list):
        raise SystemExit("decision stage outputs are unavailable")

      selected = []
      for candidate in decisions:
        if not isinstance(candidate, dict):
          continue
        sections = candidate.get("sections_relevant")
        if isinstance(sections, list) and section not in sections:
          continue
        selected.append(candidate)

      if not selected:
        raise SystemExit(f"No decision artifacts available for section {section}")

      print(json.dumps({
        "section": section,
        "selected_paper_keys": [
          candidate.get("paper_key")
          for candidate in selected
          if isinstance(candidate.get("paper_key"), str) and candidate.get("paper_key")
        ],
        "decisions": selected,
      }))
      PY

  - id: record-evidence-pack
    type: agent
    agent: research-synthesizer
    prompt: |
      You are assembling a section-level evidence pack for a graduation-thesis literature review.

      Section: {{inputs.section}}

      Use only the provided decision artifacts and preserve the current scoped paper set.
      Return strict JSON only with this schema:
      {
        "section": string,
        "selected_paper_keys": [string],
        "papers": [
          {
            "paper_key": string,
            "claim": string,
            "evidence": string,
            "strength": "strong" | "moderate" | "weak"
          }
        ],
        "anchors_count": number,
        "sufficiency_score": number,
        "grounded_claims": number,
        "total_claims": number,
        "source_stage": "evidence-pack"
      }

      Requirements:
      - Include only papers relevant to the requested section.
      - `claim` should be a thesis-usable contribution statement, not the paper title.
      - `evidence` should be a short evidence-grounded rationale from the available artifacts.
      - `selected_paper_keys` must match exactly the papers included in `papers`.
      - `sufficiency_score` must be between 0 and 1.
    needs: [prepare-evidence-pack-input]
    tags: [evidence-pack, evidence-grounding, task-sufficiency-check, artifact-lineage]
