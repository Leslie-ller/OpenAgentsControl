name: research/literature-decision
description: Turn reviewed evidence into an explicit literature decision card.
task_type: research_evidence_control

obligations:
  - key: record_decision_card
    severity: hard
    tags: [decision-card]
  - key: decision_rationale_recorded
    severity: hard
    tags: [decision-rationale]
    signals: [decision_rationale_recorded]
    requiredFields: [rationale]
  - key: artifact_lineage_recorded
    severity: hard
    tags: [artifact-lineage]
    signals: [artifact_lineage_recorded]
    requiredFields: [source_stage]

triggers:
  keywords:
    - "/literature-decision"
    - "literature decision"

inputs:
  paper_key:
    type: string
    required: true

steps:
  - id: prepare-decision-input
    type: script
    run: |
      python3 - <<'PY'
      import json
      import os

      paper_key = "{{inputs.paper_key}}"
      stage_outputs = json.loads(os.environ.get("ABILITY_STAGE_OUTPUTS_JSON", "{}"))
      reading_cards = stage_outputs.get("reading-card", [])
      if not isinstance(reading_cards, list):
        raise SystemExit("reading-card stage outputs are unavailable")

      card = None
      for candidate in reading_cards:
        if isinstance(candidate, dict) and candidate.get("paper_key") == paper_key:
          card = candidate
          break

      if card is None:
        raise SystemExit(f"No reading card available for {paper_key}")

      print(json.dumps(card))
      PY

  - id: record-decision-card
    type: agent
    agent: research-synthesizer
    prompt: |
      You are deciding how a reviewed paper should be used in a graduation-thesis literature review on integrated supply chain optimization.

      The thesis currently centers on:
      - integrated supply chain optimization
      - coordinated production, inventory, and distribution decisions
      - MILP as the main methodological baseline
      - advanced methods as screened extensions, especially prediction-and-optimization, matheuristics, and learning-assisted optimization

      Use the current `paper_key` and the provided stage artifacts.
      Return strict JSON only with this schema:
      {
        "paper_key": string,
        "title": string,
        "decision": "keep" | "defer" | "revisit",
        "rationale": string,
        "sections_relevant": [string],
        "consistency_ok": boolean,
        "based_on_reading_card": string,
        "source_stage": "decision"
      }

      Decision policy:
      - `keep` when the paper is clearly useful for the current thesis literature review.
      - `defer` when the paper is relevant but more peripheral or future-facing.
      - `revisit` when the paper is weakly aligned or too indirect.

      `sections_relevant` should use thesis-oriented labels such as:
      - "integrated-optimization"
      - "methods"
      - "advanced-methods"
      - "discussion"
      - "thesis-positioning"
    needs: [prepare-decision-input]
    tags: [decision-card, decision-rationale, consistency-check, artifact-lineage]
