name: research/literature-decision
description: Turn reviewed evidence into an explicit literature decision card.
task_type: research_evidence_control

obligations:
  - key: record_decision_card
    severity: hard
    tags: [decision-card]
  - key: decision_rationale_recorded
    severity: hard
    tags: [decision-rationale]
    signals: [decision_rationale_recorded]
    requiredFields: [rationale]
  - key: artifact_lineage_recorded
    severity: hard
    tags: [artifact-lineage]
    signals: [artifact_lineage_recorded]
    requiredFields: [source_stage]

triggers:
  keywords:
    - "/literature-decision"
    - "literature decision"

inputs:
  paper_key:
    type: string
    required: true

steps:
  - id: check-decision-capability
    type: script
    run: |
      if [ ! -x /home/leslie/code/AgentOS/.venv/bin/agentos ]; then
        echo '{"capability_ok":false,"required":"agentos","source_stage":"decision"}'
        exit 1
      fi
      if [ ! -f /home/leslie/code/AgentOS/.env ]; then
        echo '{"capability_ok":false,"required":"AgentOS .env for Zotero access","source_stage":"decision"}'
        exit 1
      fi
      echo '{"capability_ok":true,"source_stage":"decision"}'
    tags: [capability-check, artifact-lineage]

  - id: record-decision-card
    type: script
    run: |
      python3 - <<'PY'
      import json
      paper_key = "{{inputs.paper_key}}"
      print(json.dumps({
        "paper_key": paper_key,
        "title": f"Decision card for {paper_key}",
        "decision": "keep",
        "rationale": "Evidence strength and claim relevance are sufficient.",
        "sections_relevant": ["methods", "discussion"],
        "consistency_ok": True,
        "source_stage": "decision",
      }))
      PY
    tags: [decision-card, decision-rationale, consistency-check, artifact-lineage]
    needs: [check-decision-capability]
