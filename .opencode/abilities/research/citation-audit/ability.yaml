name: research/citation-audit
description: Produce a citation-audit artifact with explicit pass, revise, or fail outcomes.
task_type: research_evidence_control

obligations:
  - key: record_citation_audit
    severity: hard
    tags: [citation-audit]
  - key: evidence_grounding
    severity: hard
    tags: [evidence-grounding]
    signals: [evidence_grounding]
    requiredFields: [anchors_count]
  - key: artifact_lineage_recorded
    severity: hard
    tags: [artifact-lineage]
    signals: [artifact_lineage_recorded]
    requiredFields: [source_stage]

triggers:
  keywords:
    - "/citation-audit"
    - "citation audit"

inputs:
  section:
    type: string
    required: true
  paper_keys:
    type: array
    required: false

steps:
  - id: record-citation-audit
    type: script
    run: |
      python3 - <<'PY'
      import json
      import os

      section = "{{inputs.section}}"
      stage_outputs = json.loads(os.environ.get("ABILITY_STAGE_OUTPUTS_JSON", "{}"))
      evidence_packs = stage_outputs.get("evidence-pack", [])
      if not isinstance(evidence_packs, list):
        raise SystemExit("evidence-pack stage outputs are unavailable")

      pack = None
      for candidate in evidence_packs:
        if isinstance(candidate, dict) and candidate.get("section") == section:
          pack = candidate
          break

      if pack is None:
        raise SystemExit(f"No evidence pack available for section {section}")

      papers = pack.get("papers", [])
      if not isinstance(papers, list):
        papers = []

      issues = []
      for paper in papers:
        if not isinstance(paper, dict):
          continue
        if not paper.get("evidence"):
          issues.append({
            "citation": paper.get("paper_key", "unknown"),
            "problem": "Missing evidence field in section evidence pack.",
            "severity": "error",
          })

      if issues:
        status = "fail"
      elif len(papers) == 0:
        status = "revise"
      else:
        status = "pass"

      grounded_claims = len([paper for paper in papers if isinstance(paper, dict) and paper.get("evidence")])
      coverage_score = 0.0 if len(papers) == 0 else round(grounded_claims / len(papers), 2)
      print(json.dumps({
        "section": section,
        "selected_paper_keys": pack.get("selected_paper_keys", []),
        "status": status,
        "issues": issues,
        "coverage_score": coverage_score,
        "anchors_count": len(papers),
        "grounded_claims": grounded_claims,
        "total_claims": len(papers),
        "source_stage": "audit",
      }))
      PY
    tags: [citation-audit, evidence-grounding, artifact-lineage]
