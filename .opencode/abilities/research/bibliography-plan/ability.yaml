name: research/bibliography-plan
description: Generate a bibliography search plan with candidate queries and inclusion criteria for a research topic.
task_type: bibliography_plan

triggers:
  keywords:
    - "/bibliography plan"
    - "bibliography plan"

inputs:
  topic:
    type: string
    required: true
    description: Research topic or thesis section to plan bibliography search for

steps:
  - id: search-academic-landscape
    type: script
    run: |
      timeout 30s /home/leslie/code/AgentOS/.venv/bin/agentos search --mode academic --query "{{inputs.topic}}" --limit 5 || \
      python3 - <<'PY'
      import json
      print(json.dumps({
        "query": "{{inputs.topic}}",
        "result_count": 0,
        "results": [],
        "warning": "academic search timed out or failed"
      }))
      PY

  - id: search-zotero-coverage
    type: script
    run: |
      set -e
      set -a
      . /home/leslie/code/AgentOS/.env
      set +a
      /home/leslie/code/AgentOS/.venv/bin/agentos zotero-search --query "{{inputs.topic}}" --limit 5
    needs: [search-academic-landscape]

  - id: generate-plan
    type: script
    run: |
      python3 - <<'PY'
      import json
      import os
      import re
      from datetime import datetime

      topic = "{{inputs.topic}}".strip()
      step_outputs = json.loads(os.environ.get("ABILITY_STEP_OUTPUTS_JSON", "{}"))

      GENERIC_TOPIC_TOKENS = {
        "analysis", "approach", "approaches", "background", "chapter", "chapters",
        "dissertation", "graduate", "graduation", "introduction", "literature",
        "mapping", "master", "overview", "paper", "papers", "related", "research",
        "review", "reviews", "section", "sections", "state", "study", "studies",
        "survey", "surveys", "systematic", "thesis", "work", "works",
        "baseline", "extension", "extensions", "with", "without", "using", "based",
      }
      PHRASE_PATTERNS = [
        ("integrated", "supply", "chain", "optimization"),
        ("supply", "chain", "optimization"),
        ("supply", "chain"),
        ("mixed", "integer", "linear", "programming"),
        ("prediction", "and", "optimization"),
        ("learning", "assisted", "optimization"),
        ("machine", "learning"),
        ("combinatorial", "optimization"),
        ("operations", "research"),
        ("inventory", "management"),
        ("inventory", "control"),
        ("transportation", "routing"),
        ("production", "planning"),
      ]
      SUPPORT_TERM_PRIORITY = {
        "milp": 0,
        "inventory": 1,
        "transportation": 2,
        "production": 3,
        "routing": 4,
        "planning": 5,
        "prediction": 6,
        "learning": 7,
        "assisted": 8,
        "machine": 9,
        "combinatorial": 10,
        "integrated": 11,
      }

      def load_step_output(step_id):
        payload = step_outputs.get(step_id, {})
        raw = payload.get("output") if isinstance(payload, dict) else None
        if not isinstance(raw, str) or not raw.strip():
          return {}
        try:
          parsed = json.loads(raw)
          return parsed if isinstance(parsed, dict) else {"value": parsed}
        except Exception:
          return {"raw": raw}

      def tokenize(text):
        if not isinstance(text, str):
          return []
        return re.findall(r"[a-z0-9]+", text.lower())

      def normalize_token(token):
        if len(token) > 4 and token.endswith("ies"):
          return token[:-3] + "y"
        if len(token) > 5 and token.endswith("ing"):
          return token[:-3]
        if len(token) > 4 and token.endswith("s") and not token.endswith("sis"):
          return token[:-1]
        return token

      def append_unique(items, value):
        if not isinstance(value, str):
          return
        normalized = value.strip()
        if normalized and normalized not in items:
          items.append(normalized)

      def unique(items):
        seen = set()
        ordered = []
        for item in items:
          if not isinstance(item, str):
            continue
          value = item.strip()
          if not value or value in seen:
            continue
          seen.add(value)
          ordered.append(value)
        return ordered

      def normalized_tokens(text):
        return [normalize_token(token) for token in tokenize(text)]

      def contains_pattern(tokens, pattern):
        size = len(pattern)
        if size == 0 or len(tokens) < size:
          return False
        for index in range(len(tokens) - size + 1):
          if tuple(tokens[index:index + size]) == pattern:
            return True
        return False

      def derive_focus_terms(text):
        terms = []
        seen = set()
        for token in tokenize(text):
          normalized = normalize_token(token)
          if len(normalized) < 4 or normalized in GENERIC_TOPIC_TOKENS or normalized in seen:
            continue
          seen.add(normalized)
          terms.append(normalized)
        return terms

      def detect_domain_phrases(text):
        tokens = normalized_tokens(text)
        token_set = set(tokens)
        phrases = []
        if {"integrated", "supply", "chain", "optimization"}.issubset(token_set):
          append_unique(phrases, "integrated supply chain optimization")
        if {"supply", "chain", "optimization"}.issubset(token_set):
          append_unique(phrases, "supply chain optimization")
        if {"supply", "chain"}.issubset(token_set):
          append_unique(phrases, "supply chain")
        if "milp" in token_set or {"mixed", "integer", "linear", "programming"}.issubset(token_set):
          append_unique(phrases, "mixed integer linear programming")
        for pattern in PHRASE_PATTERNS:
          if contains_pattern(tokens, pattern):
            append_unique(phrases, " ".join(pattern))
        if {"prediction", "optimization"}.issubset(token_set):
          append_unique(phrases, "prediction and optimization")
        if {"learning", "assisted", "optimization"}.issubset(token_set):
          append_unique(phrases, "learning assisted optimization")
        if {"machine", "learning"}.issubset(token_set):
          append_unique(phrases, "machine learning")
        return phrases

      def derive_focus_phrases(text, focus_terms):
        focus_set = set(focus_terms)
        tokens = normalized_tokens(text)
        phrases = []
        current = []
        for token in tokens:
          if token in focus_set:
            current.append(token)
          else:
            if current:
              phrases.append(" ".join(current))
              current = []
        if current:
          phrases.append(" ".join(current))
        phrases = [phrase for phrase in phrases if phrase]
        if not phrases and focus_terms:
          phrases.append(" ".join(focus_terms[:3]))
        return unique(phrases)

      def prioritize_primary_focus(domain_phrases, focus_phrases):
        preferred = [
          "supply chain optimization",
          "integrated supply chain optimization",
          "prediction and optimization",
          "mixed integer linear programming",
          "operations research",
          "combinatorial optimization",
          "learning assisted optimization",
          "machine learning",
          "supply chain",
        ]
        domain_set = set(domain_phrases)
        for phrase in preferred:
          if phrase in domain_set:
            return phrase
        optimization_phrases = [phrase for phrase in domain_phrases if "optimization" in phrase]
        if optimization_phrases:
          return max(optimization_phrases, key=lambda phrase: (len(phrase.split()), len(phrase)))
        if domain_phrases:
          return domain_phrases[0]
        return focus_phrases[0] if focus_phrases else topic

      def derive_required_phrases(primary_focus_query, focus_phrases, domain_phrases):
        required = []
        domain_set = set(domain_phrases)
        if any(
          phrase in domain_set
          for phrase in ("integrated supply chain optimization", "supply chain optimization", "supply chain")
        ):
          append_unique(required, "supply chain")
        if "operations research" in domain_set:
          append_unique(required, "operations research")
        if not required:
          for phrase in [primary_focus_query] + focus_phrases + domain_phrases:
            if isinstance(phrase, str) and len(phrase.split()) >= 2:
              append_unique(required, phrase)
              break
        return required

      def rank_support_terms(terms):
        ordered = unique(terms)
        original_order = {term: index for index, term in enumerate(ordered)}
        return sorted(
          ordered,
          key=lambda term: (SUPPORT_TERM_PRIORITY.get(term, 100), original_order.get(term, 100)),
        )

      academic = load_step_output("search-academic-landscape")
      zotero = load_step_output("search-zotero-coverage")

      academic_results = academic.get("results", [])
      zotero_items = zotero.get("items", [])
      if not isinstance(academic_results, list):
        academic_results = []
      if not isinstance(zotero_items, list):
        zotero_items = []

      focus_terms = derive_focus_terms(topic)
      focus_phrases = derive_focus_phrases(topic, focus_terms)
      domain_phrases = detect_domain_phrases(topic)
      primary_focus_query = prioritize_primary_focus(domain_phrases, focus_phrases)
      required_phrases = derive_required_phrases(primary_focus_query, focus_phrases, domain_phrases)

      required_terms = unique(derive_focus_terms(primary_focus_query))
      for phrase in required_phrases:
        for term in derive_focus_terms(phrase):
          append_unique(required_terms, term)
      if not required_terms:
        required_terms = focus_terms[:2] if len(focus_terms) >= 2 else focus_terms[:1]
      required_terms = required_terms[:3]
      support_terms = rank_support_terms([term for term in focus_terms if term not in required_terms])[:4]

      query_candidates = [primary_focus_query]
      if "milp" in focus_terms:
        query_candidates.append(f"{primary_focus_query} milp")
      operational_terms = [term for term in ("production", "inventory", "transportation") if term in focus_terms]
      if len(operational_terms) >= 2:
        query_candidates.append(f"{primary_focus_query} {' '.join(operational_terms)}")
      elif support_terms:
        query_candidates.append(f"{primary_focus_query} {support_terms[0]}")
      query_candidates.append(f"{primary_focus_query} systematic review")
      if "prediction and optimization" in domain_phrases:
        query_candidates.append(f"{primary_focus_query} prediction and optimization")
      else:
        query_candidates.append(f"{primary_focus_query} survey")
      if (
        "mixed integer linear programming" in domain_phrases
        and all("milp" not in candidate for candidate in query_candidates)
        and all("mixed integer linear programming" not in candidate for candidate in query_candidates)
      ):
        query_candidates.append(f"{primary_focus_query} mixed integer linear programming")

      queries = unique(query for query in query_candidates if query.strip())

      years = []
      for result in academic_results:
        if not isinstance(result, dict):
          continue
        metadata = result.get("metadata", {})
        if not isinstance(metadata, dict):
          continue
        year = metadata.get("year")
        if isinstance(year, int):
          years.append(year)
        published = metadata.get("published")
        if isinstance(published, str) and len(published) >= 4 and published[:4].isdigit():
          years.append(int(published[:4]))
      current_year = datetime.utcnow().year
      year_floor = max(current_year - 10, min(years)) if years else current_year - 10

      academic_preview = []
      for result in academic_results[:3]:
        if not isinstance(result, dict):
          continue
        academic_preview.append({
          "title": result.get("title"),
          "provider": result.get("provider"),
          "url": result.get("url"),
          "year": result.get("metadata", {}).get("year") if isinstance(result.get("metadata"), dict) else None,
        })

      zotero_preview = []
      for item in zotero_items[:3]:
        if not isinstance(item, dict):
          continue
        zotero_preview.append({
          "key": item.get("key"),
          "title": item.get("title"),
          "date": item.get("date"),
          "item_type": item.get("item_type"),
        })

      academic_count = academic.get("result_count")
      zotero_count = zotero.get("result_count")
      if not isinstance(academic_count, int):
        academic_count = len(academic_results)
      if not isinstance(zotero_count, int):
        zotero_count = len(zotero_items)

      warnings = []
      if isinstance(academic.get("warning"), str) and academic.get("warning").strip():
        warnings.append({
          "code": "academic-search-warning",
          "severity": "warning",
          "message": academic.get("warning").strip(),
        })
      if academic_count == 0 and zotero_count == 0:
        warnings.append({
          "code": "no-search-coverage",
          "severity": "warning",
          "message": "No academic or Zotero matches were found for the current bibliography direction.",
        })
      elif academic_count < 3 and zotero_count == 0:
        warnings.append({
          "code": "sparse-search-coverage",
          "severity": "info",
          "message": "Search coverage is sparse; the generated direction may need broader or alternate queries.",
        })

      target_count = 8
      if academic_count >= 10 or zotero_count >= 5:
        target_count = 20
      elif academic_count >= 5 or zotero_count >= 2:
        target_count = 12

      screening_hints = {
        "min_anchor_matches": 2 if len(required_terms) >= 2 else 1,
        "require_support_field_match": len(required_terms) >= 2,
        "prefer_recent_years_from": year_floor,
      }

      direction_summary = primary_focus_query
      if required_phrases and support_terms:
        direction_summary = (
          f"Prioritize papers that explicitly stay within {required_phrases[0]} "
          f"and connect to {' + '.join(support_terms[:2])}."
        )
      elif required_phrases:
        direction_summary = f"Prioritize papers that explicitly stay within {required_phrases[0]}."
      elif support_terms:
        direction_summary = (
          f"Prioritize papers anchored on {' + '.join(required_terms)} "
          f"and prefer ones that also connect to {' + '.join(support_terms)}."
        )
      elif required_terms:
        direction_summary = f"Prioritize papers anchored on {' + '.join(required_terms)}."

      plan_status = "ready"
      if any(warning["code"] == "no-search-coverage" for warning in warnings):
        plan_status = "degraded"
      elif any(warning["code"] == "academic-search-warning" for warning in warnings):
        plan_status = "degraded"
      elif any(warning["code"] == "sparse-search-coverage" for warning in warnings):
        plan_status = "partial"

      print(json.dumps({
        "topic": topic,
        "queries": queries,
        "plan_status": plan_status,
        "inclusion_criteria": [
          f"Title or abstract clearly matches the planned focus: {primary_focus_query}",
          f"Preserve the domain anchor phrase(s): {', '.join(required_phrases)}" if required_phrases else "Preserve the planned domain anchors from the topic phrasing",
          "Prefer peer-reviewed or strongly cited academic sources",
          f"Prioritize results from {year_floor}-{current_year}",
        ],
        "exclusion_criteria": [
          "Weak topical match in title/snippet",
          "Duplicate library entries with no added evidence value",
          "Results that only match broad thesis/review wording without the planned focus terms",
          f"Results published before {year_floor} unless historically foundational",
        ],
        "target_count": target_count,
        "direction_summary": direction_summary,
        "search_profile": {
          "normalized_focus_query": primary_focus_query,
          "search_queries": queries,
          "required_terms": required_terms,
          "support_terms": support_terms,
          "required_phrases": required_phrases,
          "detected_domain_phrases": domain_phrases,
          "excluded_terms": [],
          "screening_hints": screening_hints,
        },
        "search_summary": {
          "academic_result_count": academic_count,
          "zotero_result_count": zotero_count,
          "academic_warning": academic.get("warning"),
          "required_phrases": required_phrases,
          "warning_count": len(warnings),
        },
        "warnings": warnings,
        "candidate_papers": {
          "academic": academic_preview,
          "zotero": zotero_preview,
        },
      }))
      PY
    tags: [bibliography-plan]
    needs: [search-zotero-coverage]
